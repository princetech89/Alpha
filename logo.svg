<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" width="100" height="100">
  <defs>
    <linearGradient id="sg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2ff"/>
      <stop offset="100%" stop-color="#ff0033"/>
    </linearGradient>
  </defs>
  <!-- A-shape outline in a mid-slate that works on both light and dark -->
  <path d="M30,75 C30,75 50,25 50,25 C50,25 70,75 70,75"
        fill="none" stroke="#475569" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Gradient A-shape overlay -->
  <path d="M30,75 C30,75 50,25 50,25 C50,25 70,75 70,75"
        fill="none" stroke="url(#sg)" stroke-width="7"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cross-bar with gradient -->
  <path d="M35,60 C35,60 65,56 65,46 C65,36 35,36 35,46"
        fill="none" stroke="url(#sg)" stroke-width="8"
        stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Red apex dot -->
  <circle cx="50" cy="25" r="5" fill="#ff0033"/>
</svg>
